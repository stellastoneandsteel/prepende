<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="concept art: a perpendicular axis of light rising from the gap between two coupled oscillating waveforms">
  <defs>
    <linearGradient id="beam" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#2fb89a" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#2fb89a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#cfeee7" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="topband"><rect x="0" y="120" width="800" height="70"/></clipPath>
    <clipPath id="botband"><rect x="0" y="260" width="800" height="70"/></clipPath>
    <style>
      @keyframes scroll { from { transform: translateX(0); } to { transform: translateX(-200px); } }
      @keyframes pulse  { 0%,100% { opacity:.35; } 50% { opacity:.9; } }
      .wave { animation: scroll 3.2s linear infinite; }
      .beam { animation: pulse 2.6s ease-in-out infinite; transform-origin:center; }
      .spark{ animation: pulse 2.6s ease-in-out infinite; }
    </style>
  </defs>

  <rect width="800" height="450" fill="#0e1626"/>
  <!-- faint grid -->
  <g stroke="#1c2a44" stroke-width="1">
    <line x1="0" y1="112" x2="800" y2="112"/><line x1="0" y1="225" x2="800" y2="225"/><line x1="0" y1="338" x2="800" y2="338"/>
    <line x1="200" y1="0" x2="200" y2="450"/><line x1="400" y1="0" x2="400" y2="450"/><line x1="600" y1="0" x2="600" y2="450"/>
  </g>

  <!-- top oscillator (teal) -->
  <g clip-path="url(#topband)">
    <path class="wave" d="M0,155 q25,-22 50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0" fill="none" stroke="#2fb89a" stroke-width="2.5"/>
  </g>
  <!-- bottom oscillator (blue), anti-phase -->
  <g clip-path="url(#botband)">
    <path class="wave" d="M0,295 q25,22 50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0 t50,0" fill="none" stroke="#5b9bf0" stroke-width="2.5"/>
  </g>

  <!-- the gap -->
  <rect x="0" y="190" width="800" height="70" fill="#0a111e"/>
  <line x1="0" y1="225" x2="800" y2="225" stroke="#26405f" stroke-dasharray="4 6"/>

  <!-- the perpendicular axis of light rising from the gap -->
  <rect class="beam" x="392" y="20" width="16" height="205" fill="url(#beam)"/>
  <circle class="spark" cx="400" cy="225" r="6" fill="#cfeee7"/>
  <circle class="spark" cx="400" cy="225" r="13" fill="none" stroke="#2fb89a" stroke-opacity="0.5" stroke-width="1.5"/>
</svg>
